name: Deploy demo to GitHub Pages

# Publishes the no-backend demo build (VITE_DEMO_MODE) to GitHub Pages on every
# push to main. The real Rayfin backend is NOT deployed here — Pages is static.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build demo bundle
        run: npm run build:demo
        env:
          VITE_BASE: /rayfin-slotting/
      - name: SPA fallback for client-side routes
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
